<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OC Tracker — inCISive 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#03040f;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);
  --text:#e8e8f8;--muted:#4a4a70;--accent:#F59E0B;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;overflow-x:hidden}

/* ── Galaxy BG ── */
canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.minion-bg{
  position:fixed;bottom:0;left:0;right:0;height:90px;
  z-index:1;pointer-events:none;
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 5%;opacity:0.15;
}
.minion-bg svg{height:75px;width:auto}

/* ── Password gate ── */
.pw-gate{
  position:fixed;inset:0;z-index:1000;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
}
.pw-gate.hidden{display:none}
.pw-minion{font-size:3.5rem;animation:float 3s ease-in-out infinite;margin-bottom:20px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.pw-title{font-family:'Bangers',cursive;font-size:2.4rem;letter-spacing:3px;text-align:center;
  background:linear-gradient(135deg,#F59E0B,#FDE68A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 16px rgba(245,158,11,.4));margin-bottom:6px}
.pw-sub{color:var(--muted);font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:28px}
.pw-input{
  width:100%;max-width:340px;background:rgba(255,255,255,.05);
  border:1.5px solid rgba(255,255,255,.1);color:var(--text);
  padding:15px 20px;border-radius:14px;font-family:'Space Grotesk',sans-serif;
  font-size:1rem;letter-spacing:4px;text-align:center;outline:none;margin-bottom:12px;
  transition:border-color .2s;
}
.pw-input:focus{border-color:var(--accent)}
.pw-input.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-8px)}50%{transform:translateX(8px)}}
.pw-btn{
  width:100%;max-width:340px;padding:15px;
  background:linear-gradient(135deg,#F59E0B,#F97316);
  border:none;border-radius:14px;font-family:'Bangers',cursive;
  font-size:1.3rem;letter-spacing:3px;color:#000;cursor:pointer;
}
.pw-err{color:#f87171;font-size:0.8rem;margin-top:10px;min-height:18px;text-align:center}

/* ── Topbar ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(3,4,15,.9);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.topbar-main{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
}
.logo{font-family:'Bangers',cursive;font-size:1.3rem;letter-spacing:2px;flex:1;
  background:linear-gradient(135deg,#F59E0B,#FDE68A);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;animation:lp 2s infinite;flex-shrink:0}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.3}}
.live-lbl{font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.icon-btn{
  width:36px;height:36px;border-radius:10px;border:1.5px solid var(--border);
  background:transparent;color:var(--muted);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;
}
.icon-btn:active,.icon-btn.active{border-color:rgba(255,255,255,.2);color:var(--text)}

.day-bar{
  display:flex;gap:4px;padding:0 16px 10px;
}
.day-tab{
  flex:1;padding:8px 4px;border-radius:10px;border:1.5px solid transparent;
  background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;
  font-size:0.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;transition:all .2s;text-align:center;
}
.day-tab.active{border-color:rgba(245,158,11,.4);color:#F59E0B;background:rgba(245,158,11,.08)}

/* ── Main ── */
.main{position:relative;z-index:10;padding:0 16px 120px}

/* ── Wall section ── */
.wall-section{padding:20px 0 16px}
.s-eyebrow{font-size:0.58rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.s-heading{font-family:'Bangers',cursive;font-size:2rem;letter-spacing:2px;line-height:1;margin-bottom:20px}

.wall-wrap{position:relative;padding-left:36px}
.wall-yaxis{
  position:absolute;left:0;top:0;bottom:0;
  display:flex;flex-direction:column-reverse;justify-content:space-between;padding:2px 0;
}
.wall-yl{font-family:'Orbitron',monospace;font-size:0.45rem;color:var(--muted);letter-spacing:.5px}
.wall-container{
  position:relative;height:260px;
  display:flex;align-items:flex-end;gap:4px;
  border-bottom:1.5px solid var(--border);
}
.wall-container::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(to top,transparent 0,transparent calc(25% - 1px),rgba(255,255,255,.03) calc(25% - 1px),rgba(255,255,255,.03) 25%);
  pointer-events:none;
}
.wall-col{flex:1;height:100%;position:relative;display:flex;align-items:flex-end;justify-content:center}
.wall-bubble{
  position:absolute;bottom:0;width:100%;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;transition:bottom 1.2s cubic-bezier(.34,1.56,.64,1);
}
.bubble-card{
  width:min(52px,90%);aspect-ratio:1;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:2px solid var(--tc,#888);
  background:radial-gradient(circle at 35% 35%,color-mix(in srgb,var(--tc) 18%,#05050f),#05050f);
  box-shadow:0 0 14px color-mix(in srgb,var(--tc) 25%,transparent);
  transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;
}
.bubble-card::after{content:'';position:absolute;top:14%;left:18%;width:28%;height:18%;background:rgba(255,255,255,.15);border-radius:50%;transform:rotate(-30deg)}
.wall-bubble:active .bubble-card{transform:scale(.95)}
.b-emoji{font-size:1.1rem;line-height:1}
.b-pts{font-family:'Orbitron',monospace;font-size:0.52rem;font-weight:900;color:var(--tc);letter-spacing:.5px}
.b-rank{font-family:'Orbitron',monospace;font-size:0.45rem;color:var(--muted);letter-spacing:1px}
.b-name{font-size:0.55rem;font-weight:600;color:var(--muted);text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px}

/* ── Ranking list ── */
.rank-list{display:flex;flex-direction:column;gap:8px;margin-top:20px}
.rank-card{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,.025);border:1px solid var(--border);
  border-radius:14px;padding:12px 14px;cursor:pointer;transition:all .2s;
  position:relative;overflow:hidden;
}
.rank-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--tc,transparent);border-radius:3px 0 0 3px}
.rank-card:active{background:rgba(255,255,255,.04);transform:translateX(2px)}
.rc-rank{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:900;color:var(--muted);width:22px;flex-shrink:0}
.rc-rank.top{color:var(--tc)}
.rc-emoji{font-size:1.5rem;flex-shrink:0}
.rc-info{flex:1;min-width:0}
.rc-name{font-size:.85rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-sub{font-size:.68rem;color:var(--muted);margin-top:1px}
.rc-bar-wrap{flex:1.5;max-width:100px;background:rgba(255,255,255,.05);border-radius:99px;height:5px;overflow:hidden}
.rc-bar{height:100%;border-radius:99px;background:var(--tc);transition:width 1s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 6px color-mix(in srgb,var(--tc) 50%,transparent)}
.rc-pts-val{font-family:'Orbitron',monospace;font-size:.9rem;font-weight:900;color:var(--tc);flex-shrink:0;min-width:52px;text-align:right}
.rc-delta{font-size:.6rem;color:#4ade80;text-align:right;min-height:14px;transition:opacity .3s;opacity:0}
.rc-delta.show{opacity:1}

/* ── Feed ── */
.feed-list{display:flex;flex-direction:column;gap:8px;padding-top:16px}
.feed-ev{
  background:rgba(255,255,255,.025);border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;
}
.feed-ev.fp{border-left:3px solid #22c55e}.feed-ev.fn{border-left:3px solid #ef4444}.feed-ev.fs{border-left:3px solid #f97316}
.f-emoji{font-size:1.2rem;flex-shrink:0}
.f-content{flex:1;min-width:0}
.f-name{font-weight:700;font-size:.83rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.f-note{color:var(--muted);font-size:.72rem;margin-top:2px}
.f-time{color:var(--muted);font-size:.65rem;margin-top:1px}
.f-pts{font-family:'Orbitron',monospace;font-size:.9rem;font-weight:900;flex-shrink:0}
.f-pts.pos{color:#4ade80}.f-pts.neg{color:#f87171}
.undo-btn{
  background:none;border:1px solid rgba(239,68,68,.2);color:rgba(239,68,68,.5);
  border-radius:8px;padding:5px 8px;font-size:.65rem;cursor:pointer;flex-shrink:0;
  transition:all .2s;white-space:nowrap;
}
.undo-btn:active{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.08)}

/* ── Detail overlay ── */
.detail-overlay{
  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;transition:opacity .3s;
  display:flex;justify-content:flex-end;
}
.detail-overlay.open{opacity:1;pointer-events:all}
.detail-panel{
  width:100%;max-width:420px;height:100%;background:#08081f;
  border-left:1px solid var(--border);display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.25,.46,.45,.94);overflow:hidden;
}
.detail-overlay.open .detail-panel{transform:translateX(0)}
.detail-hero{
  padding:32px 20px 20px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;
}
.detail-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 100%,var(--hc,rgba(245,158,11,.1)),transparent 70%);pointer-events:none}
.d-close{position:absolute;top:14px;right:14px;background:none;border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center}
.d-emoji{font-size:2.8rem;margin-bottom:8px}
.d-name{font-family:'Bangers',cursive;font-size:1.8rem;letter-spacing:2px;line-height:1}
.d-pts{font-family:'Orbitron',monospace;font-size:2.2rem;font-weight:900;margin-top:6px}
.d-rank{display:inline-block;margin-top:6px;padding:3px 12px;border-radius:99px;font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:rgba(255,255,255,.07);color:var(--muted)}
.detail-body{flex:1;overflow-y:auto;padding:16px 20px}
.detail-body::-webkit-scrollbar{width:3px}
.detail-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.d-sec-title{font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.ev-item{
  background:rgba(255,255,255,.025);border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;margin-bottom:8px;
  display:flex;align-items:center;gap:10px;
}
.ev-item.ep{border-left:3px solid #22c55e}.ev-item.en{border-left:3px solid #ef4444}.ev-item.es{border-left:3px solid #f97316}
.ev-content{flex:1;min-width:0}
.ev-name{font-weight:700;font-size:.83rem}
.ev-note{color:var(--muted);font-size:.72rem;margin-top:2px}
.ev-time{color:var(--muted);font-size:.65rem;margin-top:1px}
.ev-pts{font-family:'Orbitron',monospace;font-size:.9rem;font-weight:900;flex-shrink:0}
.ev-pts.pos{color:#4ade80}.ev-pts.neg{color:#f87171}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:.88rem}

/* ── Ticker ── */
.ticker{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(3,4,15,.92);border-top:1px solid var(--border);backdrop-filter:blur(12px);padding:8px 0;overflow:hidden}
.ticker-inner{display:flex;white-space:nowrap;animation:tick 35s linear infinite}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tick-item{display:inline-flex;align-items:center;gap:6px;padding:0 20px;font-size:.72rem;color:var(--muted);border-right:1px solid var(--border);flex-shrink:0}
.tick-rank{font-family:'Orbitron',monospace;font-size:.5rem;font-weight:900}
.tick-name{font-weight:600;color:var(--text)}
.tick-pts{font-family:'Orbitron',monospace;font-weight:700}

/* ── Screen flash ── */
.sflash{position:fixed;inset:0;z-index:999;pointer-events:none}
.sflash.fp{animation:fp .8s}
.sflash.fn{animation:fn .8s}
@keyframes fp{0%,100%{box-shadow:none}30%{box-shadow:inset 0 0 60px rgba(34,197,94,.2)}}
@keyframes fn{0%,100%{box-shadow:none}30%{box-shadow:inset 0 0 60px rgba(239,68,68,.2)}}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#0b0b20;border:1px solid rgba(255,255,255,.1);border-radius:24px 24px 0 0;padding:28px 20px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.25,.46,.45,.94)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-family:'Bangers',cursive;font-size:1.6rem;letter-spacing:2px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer}

/* Reset confirm */
.reset-card{background:rgba(239,68,68,.07);border:1.5px solid rgba(239,68,68,.2);border-radius:16px;padding:20px;text-align:center;margin-bottom:16px}
.reset-icon{font-size:2.5rem;margin-bottom:8px}
.reset-warn{color:#fca5a5;font-size:.85rem;line-height:1.7}
.reset-input{width:100%;background:rgba(0,0,0,.4);border:1.5px solid var(--border);color:var(--text);padding:12px 16px;border-radius:12px;font-family:'Space Grotesk',sans-serif;font-size:.9rem;outline:none;margin:12px 0;text-align:center;letter-spacing:2px}
.reset-input:focus{border-color:#ef4444}
.reset-btn-confirm{width:100%;padding:14px;background:linear-gradient(135deg,#ef4444,#dc2626);border:none;border-radius:12px;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:4px}

/* Settings */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.team-edit{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
.te-header{display:flex;gap:8px;margin-bottom:10px}
.te-emoji{width:46px;background:rgba(0,0,0,.4);border:1.5px solid var(--border);color:var(--text);padding:8px 4px;border-radius:8px;font-size:1.1rem;text-align:center;outline:none;font-family:'Space Grotesk',sans-serif}
.te-name{flex:1;background:rgba(0,0,0,.4);border:1.5px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-size:.8rem;outline:none;font-family:'Space Grotesk',sans-serif}
.te-color{width:100%;height:32px;border-radius:8px;border:1px solid var(--border);cursor:pointer;margin-bottom:8px}
.te-save{width:100%;padding:8px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:#F59E0B;border-radius:8px;font-family:'Space Grotesk',sans-serif;font-size:.75rem;font-weight:700;cursor:pointer}
.pw-section{border-top:1px solid var(--border);padding-top:16px}
.pw-section label{font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px}
.pw-section input{width:100%;background:rgba(0,0,0,.4);border:1.5px solid var(--border);color:var(--text);padding:11px 14px;border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:.88rem;outline:none;margin-bottom:8px}
.pw-section input:focus{border-color:var(--accent)}
.pw-save-btn{padding:11px 20px;background:linear-gradient(135deg,#F59E0B,#F97316);border:none;border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:700;color:#000;cursor:pointer}

.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%) translateY(120px);background:#22c55e;color:#fff;padding:11px 22px;border-radius:12px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.85rem;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.5);transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{background:#ef4444}

.view{display:none}.view.active{display:block}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<!-- Minion silhouettes -->
<div class="minion-bg">
  <svg viewBox="0 0 50 80" fill="rgba(180,140,0,1)">
    <ellipse cx="25" cy="58" rx="15" ry="20"/><circle cx="25" cy="26" r="18"/>
    <rect x="9" y="20" width="32" height="10" rx="5"/>
    <circle cx="25" cy="25" r="9" fill="rgba(0,0,0,.15)"/>
    <line x1="21" y1="8" x2="19" y2="0" stroke="rgba(180,140,0,1)" stroke-width="3" stroke-linecap="round"/>

    <rect x="13" y="42" width="24" height="18" rx="4" fill="rgba(20,40,120,.5)"/>

  </svg>
  <svg viewBox="0 0 50 90" fill="rgba(170,130,0,1)">
    <ellipse cx="25" cy="66" rx="13" ry="22"/><circle cx="25" cy="28" r="20"/>
    <rect x="7" y="21" width="36" height="12" rx="6"/>
    <circle cx="25" cy="27" r="10" fill="rgba(0,0,0,.12)"/>
    <line x1="22" y1="8" x2="20" y2="-1" stroke="rgba(170,130,0,1)" stroke-width="3" stroke-linecap="round"/>
    <line x1="28" y1="8" x2="30" y2="-1" stroke="rgba(170,130,0,1)" stroke-width="3" stroke-linecap="round"/>
    <rect x="14" y="48" width="22" height="20" rx="4" fill="rgba(20,40,120,.5)"/>
  </svg>
  <svg viewBox="0 0 50 80" fill="rgba(190,150,10,1)" style="transform:rotate(6deg)">
    <ellipse cx="25" cy="56" rx="17" ry="22"/><circle cx="25" cy="24" r="19"/>
    <rect x="8" y="17" width="34" height="12" rx="6"/>
    <ellipse cx="25" cy="23" r="10" fill="rgba(0,0,0,.1)"/>
    <line x1="25" y1="5" x2="25" y2="-4" stroke="rgba(190,150,10,1)" stroke-width="4" stroke-linecap="round"/>
    <line x1="19" y1="6" x2="16" y2="-1" stroke="rgba(190,150,10,1)" stroke-width="3" stroke-linecap="round"/>
    <rect x="12" y="38" width="26" height="20" rx="4" fill="rgba(20,40,120,.5)"/>
  </svg>
  <svg viewBox="0 0 50 80" fill="rgba(160,120,0,1)" style="transform:rotate(-3deg)">
    <ellipse cx="25" cy="58" rx="16" ry="20"/><circle cx="25" cy="27" r="18"/>
    <rect x="9" y="20" width="32" height="11" rx="5.5"/>
    <circle cx="25" cy="26" r="9" fill="rgba(0,0,0,.1)"/>
    <line x1="24" y1="9" x2="22" y2="0" stroke="rgba(160,120,0,1)" stroke-width="3" stroke-linecap="round"/>
    <line x1="29" y1="9" x2="32" y2="1" stroke="rgba(160,120,0,1)" stroke-width="3" stroke-linecap="round"/>
    <rect x="13" y="42" width="24" height="18" rx="4" fill="rgba(20,40,120,.5)"/>
  </svg>
</div>

<!-- Flash -->
<div class="sflash" id="sflash"></div>

<!-- ── Password gate ── -->
<div class="pw-gate" id="pwGate">
  <div class="pw-minion">🍌</div>
  <div class="pw-title">OPERATION<br>inCISive</div>
  <div class="pw-sub">OC Access · Multiverse of Minions</div>
  <input class="pw-input" type="password" id="pwInput" placeholder="Enter passphrase" onkeydown="if(event.key==='Enter')checkPw()"/>
  <button class="pw-btn" onclick="checkPw()">ENGAGE 🚀</button>
  <div class="pw-err" id="pwErr"></div>
</div>

<!-- ── Topbar ── -->
<div class="topbar">
  <div class="topbar-main">
    <div class="logo">🍌 inCISive OC</div>
    <div class="live-dot" id="liveDot"></div>
    <div class="live-lbl" id="liveLbl">Live</div>
    <button class="icon-btn active" id="btnWall" onclick="showView('wall')" title="Rankings">🧗</button>
    <button class="icon-btn" id="btnFeed" onclick="showView('feed')" title="Events">📋</button>
    <button class="icon-btn" onclick="openSettings()" title="Settings">⚙️</button>
    <button class="icon-btn" onclick="openReset()" title="Reset" style="color:#f87171;border-color:rgba(239,68,68,.3)">🗑️</button>
  </div>
  <div class="day-bar">
    <button class="day-tab active" data-d="0" onclick="setDay(0)">All</button>
    <button class="day-tab" data-d="1" onclick="setDay(1)">Day 1 — Portal</button>
    <button class="day-tab" data-d="2" onclick="setDay(2)">Day 2 — Find Gru</button>
  </div>
</div>

<!-- ── Main content ── -->
<div class="main">
  <!-- Wall view -->
  <div class="view active" id="viewWall">
    <div class="wall-section">
      <div class="s-eyebrow">Live Standings</div>
      <div class="s-heading" id="wallHeading">CLIMBING THE WALL</div>
      <div class="wall-wrap">
        <div class="wall-yaxis" id="wallY"></div>
        <div class="wall-container" id="wallC"></div>
      </div>
    </div>
    <div class="s-eyebrow" style="margin-top:20px">Full Leaderboard</div>
    <div class="rank-list" id="rankList"></div>
  </div>

  <!-- Feed view -->
  <div class="view" id="viewFeed">
    <div class="s-eyebrow" style="padding-top:20px">All Events</div>
    <div class="feed-list" id="feedList"></div>
  </div>
</div>

<!-- ── Detail panel ── -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetailBg(event)">
  <div class="detail-panel">
    <div class="detail-hero" id="dHero">
      <button class="d-close" onclick="closeDetail()">✕</button>
      <div class="d-emoji" id="dEmoji"></div>
      <div class="d-name" id="dName"></div>
      <div class="d-pts" id="dPts"></div>
      <div class="d-rank" id="dRank"></div>
    </div>
    <div class="detail-body">
      <div class="d-sec-title">Point History</div>
      <div id="dEvents"></div>
    </div>
  </div>
</div>

<!-- ── Reset modal ── -->
<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <div class="modal-title">Reset Leaderboard <button class="modal-close" onclick="closeReset()">✕</button></div>
    <div class="reset-card">
      <div class="reset-icon">⚠️</div>
      <div class="reset-warn">This will <strong>permanently delete all point events</strong> and reset every team to 0. This cannot be undone.</div>
    </div>
    <input class="reset-input" type="password" id="resetPw" placeholder="Enter OC password to confirm"/>
    <button class="reset-btn-confirm" onclick="doReset()">🗑️ Yes, Reset Everything</button>
  </div>
</div>

<!-- ── Settings modal ── -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-title">Settings <button class="modal-close" onclick="closeSettings()">✕</button></div>
    <div class="settings-grid" id="settingsGrid"></div>
    <div class="pw-section">
      <label>Change Password</label>
      <input type="password" id="pwOld" placeholder="Current password"/>
      <input type="password" id="pwNew" placeholder="New password"/>
      <button class="pw-save-btn" onclick="changePw()">Update Password</button>
    </div>
    <div class="pw-section" style="margin-top:16px">
      <label>Google Sheets Webhook URL</label>
      <input type="url" id="sheetsUrl" placeholder="https://script.google.com/macros/s/…/exec" style="font-size:0.75rem"/>
      <button class="pw-save-btn" onclick="saveSheets()">Save Webhook</button>
    </div>
  </div>
</div>

<!-- ── Ticker ── -->
<div class="ticker"><div class="ticker-inner" id="tickerInner"></div></div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<script>
let teams=[], allEvents=[], dayFilter=0;
let prevPts={};

// ── Galaxy canvas ──────────────────────────────────
(()=>{
  const c=document.getElementById('bg'),ctx=c.getContext('2d');
  let W,H,p=[];
  const resize=()=>{W=c.width=innerWidth;H=c.height=innerHeight};
  const mk=()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.12,vy:(Math.random()-.5)*.12,r:Math.random()*1.4+.2,a:Math.random()*.6+.1,c:Math.random()<.3?'200,180,255':'200,210,255'});
  const init=()=>{resize();p=Array.from({length:160},mk)};
  const draw=()=>{ctx.clearRect(0,0,W,H);for(const s of p){s.x=(s.x+s.vx+W)%W;s.y=(s.y+s.vy+H)%H;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(${s.c},${s.a})`;ctx.fill()}requestAnimationFrame(draw)};
  window.addEventListener('resize',resize);init();draw();
})();

// ── Auth ───────────────────────────────────────────
async function checkPw(){
  const pw=document.getElementById('pwInput').value;
  const r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
  if(r.ok){sessionStorage.setItem('oc_pw',pw);document.getElementById('pwGate').classList.add('hidden');initApp()}
  else{
    const el=document.getElementById('pwInput');
    document.getElementById('pwErr').textContent='❌ Wrong passphrase';
    el.classList.add('shake');setTimeout(()=>{el.classList.remove('shake');el.value=''},500);
  }
}
(function autoAuth(){
  const pw=sessionStorage.getItem('oc_pw');
  if(!pw) return;
  fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})})
    .then(r=>{if(r.ok){document.getElementById('pwGate').classList.add('hidden');initApp()}});
})();

// ── Init ───────────────────────────────────────────
async function initApp(){
  await loadAll();
  teams.forEach(t=>prevPts[t.id]=t.total_points);
  render();connectWS();
}

async function loadAll(){
  const dp=dayFilter?`?day=${dayFilter}`:'';
  [teams,allEvents]=await Promise.all([
    fetch('/api/teams'+dp).then(r=>r.json()),
    fetch('/api/events'+dp).then(r=>r.json()),
  ]);
}

function render(){renderWall();renderRankList();renderFeed();renderTicker()}

// ── Wall ───────────────────────────────────────────
function renderWall(){
  const sorted=[...teams].sort((a,b)=>b.total_points-a.total_points);
  const maxPts=Math.max(1,...sorted.map(t=>Math.abs(t.total_points)));
  const yaxis=document.getElementById('wallY');
  yaxis.innerHTML=[0,.25,.5,.75,1].map(f=>`<div class="wall-yl">${Math.round(f*maxPts)}</div>`).join('');
  const container=document.getElementById('wallC');
  const display=[...teams].sort((a,b)=>a.id.localeCompare(b.id));
  container.innerHTML=display.map(t=>{
    const rank=sorted.findIndex(x=>x.id===t.id)+1;
    const pct=maxPts>0?(t.total_points/maxPts):0;
    const bot=Math.max(0,Math.min(88,pct*85))+2;
    return`<div class="wall-col" onclick="openDetail('${t.id}')">
      <div class="wall-bubble" id="wb-${t.id}" style="bottom:${bot}%">
        <div class="b-rank">#${rank}</div>
        <div class="bubble-card" style="--tc:${t.color}">
          <div class="b-emoji">${t.emoji}</div>
          <div class="b-pts">${t.total_points}</div>
        </div>
        <div class="b-name">${t.name.replace('-verse','')}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Rank list ──────────────────────────────────────
function renderRankList(){
  const sorted=[...teams].sort((a,b)=>b.total_points-a.total_points);
  const max=Math.max(1,sorted[0]?.total_points||1);
  document.getElementById('rankList').innerHTML=sorted.map((t,i)=>{
    const rank=i+1,pct=Math.max(0,t.total_points/max*100);
    return`<div class="rank-card" style="--tc:${t.color}" onclick="openDetail('${t.id}')">
      <div class="rc-rank${rank<=3?' top':''}">${rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':rank}</div>
      <div class="rc-emoji">${t.emoji}</div>
      <div class="rc-info">
        <div class="rc-name">${t.name}</div>
        <div class="rc-sub">Tap for history</div>
      </div>
      <div class="rc-bar-wrap"><div class="rc-bar" style="width:${Math.max(1,pct)}%"></div></div>
      <div>
        <div class="rc-pts-val">${t.total_points}</div>
        <div class="rc-delta" id="rd-${t.id}"></div>
      </div>
    </div>`;
  }).join('');
}

// ── Feed ───────────────────────────────────────────
function renderFeed(){
  const list=document.getElementById('feedList');
  if(!allEvents.length){list.innerHTML='<div class="empty">🍌 No events yet</div>';return}
  list.innerHTML=allEvents.map(e=>{
    const isSabo=e.event_type==='sabotage',pts=e.points1;
    const cls=isSabo?'fs':pts>=0?'fp':'fn',pcls=pts>=0?'pos':'neg';
    const note=e.note||(isSabo?`${e.team1_emoji} ${e.team1_name} → ${e.team2_emoji} ${e.team2_name}`:'');
    return`<div class="feed-ev ${cls}">
      <div class="f-emoji">${e.team1_emoji}</div>
      <div class="f-content">
        <div class="f-name">${e.game_name} · ${e.team1_name}</div>
        ${note?`<div class="f-note">${note}</div>`:''}
        <div class="f-time">${fmtTime(e.timestamp)} · Day ${e.day||1}</div>
      </div>
      <div class="f-pts ${pcls}">${pts>0?'+':''}${pts}</div>
      <button class="undo-btn" onclick="undoEv('${e.id}',event)">↩ Undo</button>
    </div>`;
  }).join('');
}

// ── Detail ─────────────────────────────────────────
async function openDetail(teamId){
  const t=teams.find(x=>x.id===teamId);
  const rank=[...teams].sort((a,b)=>b.total_points-a.total_points).findIndex(x=>x.id===teamId)+1;
  const sfx=rank===1?'st':rank===2?'nd':rank===3?'rd':'th';
  document.getElementById('dEmoji').textContent=t.emoji;
  document.getElementById('dName').textContent=t.name;
  document.getElementById('dPts').textContent=t.total_points+' pts';
  document.getElementById('dPts').style.color=t.color;
  document.getElementById('dRank').textContent=`#${rank}${sfx} place`;
  document.getElementById('dHero').style.setProperty('--hc',`color-mix(in srgb,${t.color} 15%,transparent)`);
  const dp=dayFilter?`&day=${dayFilter}`:'';
  const evs=await fetch(`/api/events?team_id=${teamId}${dp}`).then(r=>r.json());
  document.getElementById('dEvents').innerHTML=evs.length
    ? evs.map(e=>{
        const isSabo=e.event_type==='sabotage';
        const pts=teamId===e.team2_id?e.points2:e.points1;
        const cls=isSabo?'es':pts>=0?'ep':'en',pcls=pts>=0?'pos':'neg';
        const note=e.note||(isSabo?`${e.team1_emoji} ${e.team1_name} → ${e.team2_emoji} ${e.team2_name}`:'');
        return`<div class="ev-item ${cls}">
          <div class="ev-content">
            <div class="ev-name">${e.game_name}</div>
            ${note?`<div class="ev-note">${note}</div>`:''}
            <div class="ev-time">${fmtTime(e.timestamp)} · Day ${e.day||1}</div>
          </div>
          <div class="ev-pts ${pcls}">${pts>0?'+':''}${pts}</div>
          <button class="undo-btn" onclick="undoEv('${e.id}',event)">↩</button>
        </div>`;
      }).join('')
    : '<div class="empty">No events yet</div>';
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetailBg(e){if(e.target===document.getElementById('detailOverlay'))closeDetail()}
function closeDetail(){document.getElementById('detailOverlay').classList.remove('open')}

async function undoEv(id,e){
  e.stopPropagation();
  if(!confirm('Undo this point event?')) return;
  const r=await fetch(`/api/events/${id}`,{method:'DELETE'});
  if(r.ok){toast('Event undone ↩');await loadAll();render()}else toast('Failed',true);
}

// ── Ticker ─────────────────────────────────────────
function renderTicker(){
  const sorted=[...teams].sort((a,b)=>b.total_points-a.total_points);
  const html=sorted.map((t,i)=>`<div class="tick-item"><span class="tick-rank">#${i+1}</span><span>${t.emoji}</span><span class="tick-name">${t.name.replace('-verse','')}</span><span class="tick-pts" style="color:${t.color}">${t.total_points} pts</span></div>`).join('');
  document.getElementById('tickerInner').innerHTML=html+html;
}

// ── Day filter ─────────────────────────────────────
function setDay(d){
  dayFilter=d;
  document.querySelectorAll('.day-tab').forEach(el=>el.classList.toggle('active',+el.dataset.d===d));
  const h={0:'CLIMBING THE WALL',1:'DAY 1 — FIX THE PORTAL',2:'DAY 2 — FIND GRU'};
  document.getElementById('wallHeading').textContent=h[d]||'STANDINGS';
  loadAll().then(render);
}

// ── View switching ─────────────────────────────────
function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view'+v.charAt(0).toUpperCase()+v.slice(1)).classList.add('active');
  document.getElementById('btnWall').classList.toggle('active',v==='wall');
  document.getElementById('btnFeed').classList.toggle('active',v==='feed');
}

// ── Reset ──────────────────────────────────────────
function openReset(){document.getElementById('resetPw').value='';document.getElementById('resetModal').classList.add('open')}
function closeReset(){document.getElementById('resetModal').classList.remove('open')}
async function doReset(){
  const pw=document.getElementById('resetPw').value;
  const r=await fetch('/api/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
  if(r.ok){closeReset();toast('Leaderboard reset ✓');await loadAll();render()}
  else toast('Wrong password',true);
}

// ── Settings ───────────────────────────────────────
async function openSettings(){
  document.getElementById('settingsModal').classList.add('open');
  renderSettingsGrid();
  // Pre-fill webhook URL
  try{const s=await fetch('/api/settings').then(r=>r.json());document.getElementById('sheetsUrl').value=s.sheets_webhook_url||''}catch(e){}
}
function closeSettings(){document.getElementById('settingsModal').classList.remove('open')}
function renderSettingsGrid(){
  document.getElementById('settingsGrid').innerHTML=teams.map(t=>`
    <div class="team-edit">
      <div class="te-header">
        <input class="te-emoji" id="te-em-${t.id}" value="${t.emoji}" maxlength="2"/>
        <input class="te-name" id="te-nm-${t.id}" value="${t.name}"/>
      </div>
      <input type="color" class="te-color" id="te-cl-${t.id}" value="${t.color}"/>
      <button class="te-save" onclick="saveTeam('${t.id}')">Save</button>
    </div>`).join('');
}
async function saveTeam(id){
  await fetch(`/api/teams/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById(`te-nm-${id}`).value,emoji:document.getElementById(`te-em-${id}`).value,color:document.getElementById(`te-cl-${id}`).value})});
  await loadAll();render();toast('Saved!');
}
async function saveSheets(){
  const url=document.getElementById('sheetsUrl').value.trim();
  const pw=sessionStorage.getItem('oc_pw');
  const r=await fetch('/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({current_password:pw,sheets_webhook_url:url})});
  if(r.ok) toast('Webhook saved!'); else toast('Failed to save',true);
}
async function changePw(){
  const r=await fetch('/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({current_password:document.getElementById('pwOld').value,password:document.getElementById('pwNew').value})});
  if(r.ok){sessionStorage.setItem('oc_pw',document.getElementById('pwNew').value);toast('Password updated!');document.getElementById('pwOld').value='';document.getElementById('pwNew').value=''}
  else toast('Wrong password',true);
}

// ── WebSocket ──────────────────────────────────────
let ws;
function connectWS(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen=()=>{document.getElementById('liveDot').style.background='#22c55e';document.getElementById('liveLbl').textContent='Live'};
  ws.onclose=()=>{document.getElementById('liveDot').style.background='#ef4444';document.getElementById('liveLbl').textContent='Reconnecting…';setTimeout(connectWS,2500)};
  ws.onmessage=async msg=>{
    const data=JSON.parse(msg.data);
    if(data.type==='update'||data.type==='reset'){
      const old={};teams.forEach(t=>old[t.id]=t.total_points);
      await loadAll();
      teams.forEach(t=>{
        const diff=t.total_points-(old[t.id]??t.total_points);
        if(diff!==0){
          const el=document.getElementById(`rd-${t.id}`);
          if(el){el.textContent=(diff>0?'+':'')+diff+' pts';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3500)}
        }
      });
      render();
      if(data.latest_event){const p=data.latest_event.points1;flash(p>=0?'fp':'fn');chime(p>=0)}
    }
  };
}

function flash(cls){const el=document.getElementById('sflash');el.className='sflash '+cls;setTimeout(()=>el.className='sflash',900)}
function chime(pos){
  try{const ctx=new AudioContext();const n=pos?[523,659,784]:[392,330,261];let t=ctx.currentTime;n.forEach(f=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.32);o.start(t);o.stop(t+.32);t+=.18})}catch(e){}
}

function fmtTime(iso){return new Date(iso).toLocaleString('en-SG',{dateStyle:'short',timeStyle:'short'})}
function toast(msg,err){const el=document.getElementById('toast');el.textContent=msg;el.className='toast'+(err?' err':'')+' show';setTimeout(()=>el.className='toast'+(err?' err':''),2800)}
</script>
</body>
</html>
